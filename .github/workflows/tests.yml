name: run tests

on:  
  schedule:    
    - cron: '*/20 * * * *'  
  workflow_dispatch: 
    inputs:
      registrations:
        description: 'Number of registrations per run'
        required: true
        default: '5'
        type: string
      threads:
        description: 'Number of parallel threads (speed)'
        required: true
        default: '5'
        type: string
      clear_file:
        description: 'Clear m1.txt and s1.txt before running?'
        required: true
        default: true
        type: boolean

permissions:  
  contents: write

jobs:  
  update-links:    
    runs-on: ubuntu-latest    
    steps:      
      - name: Checkout repository        
        uses: actions/checkout@v4      

      - name: Set up Python        
        uses: actions/setup-python@v5        
        with:          
          python-version: '3.10'      

      - name: Install dependencies        
        run: |          
          python -m pip install --upgrade pip          
          pip install requests      

      - name: Run script
        env:
          # Use UI inputs for manual triggers, fallback to 1 registration for cron to keep it lightweight
          REG_COUNT: ${{ inputs.registrations || '1' }}
          THREADS: ${{ inputs.threads || '1' }}
          # Force append mode (false) for cron to protect your proxies
          CLEAR_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.clear_file || 'false' }}
        run: |          
          python script.py
          
      - name: Commit and push changes        
        run: |          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"          
          git config --local user.name "github-actions[bot]"          
          git add m1.txt s1.txt                    
          git diff --staged --quiet || git commit -m "Automatic update of VLESS links (Multithreaded)"          
          git push


